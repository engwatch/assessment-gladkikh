<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Protected Report</title>
<style>
:root { --bg:#eef4ff; --card:#ffffff; --line:#d9e4f2; --text:#102033; --muted:#62748a; --blue:#2563eb; --shadow:0 18px 40px rgba(15,23,42,.12); }
* { box-sizing:border-box; }
body { margin:0; font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at top left, rgba(37,99,235,.14), transparent 30%), linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%); color:var(--text); }
.card { width:min(92vw, 460px); background:var(--card); border:1px solid var(--line); border-radius:28px; padding:32px; box-shadow:var(--shadow); }
.lock { width:60px; height:60px; border-radius:18px; display:grid; place-items:center; font-size:28px; background:#eaf1ff; margin-bottom:18px; }
h1 { margin:0 0 10px; font-size:30px; letter-spacing:-.04em; }
p { margin:0 0 18px; line-height:1.6; color:var(--muted); }
label { display:block; margin-bottom:8px; font-size:13px; font-weight:700; color:var(--muted); }
input { width:100%; padding:14px 16px; border-radius:16px; border:1px solid var(--line); font-size:16px; outline:none; }
input:focus { border-color:#b8ccff; box-shadow:0 0 0 4px rgba(37,99,235,.12); }
button { width:100%; margin-top:14px; padding:14px 18px; border:none; border-radius:16px; background:linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%); color:#fff; font-size:15px; font-weight:800; cursor:pointer; }
.error { min-height:22px; margin-top:12px; color:#b91c1c; font-size:14px; }
.note { margin-top:8px; font-size:12px; color:var(--muted); }
</style>
</head>

const dec = new TextDecoder();
function b64ToBuf(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}
async function deriveKey(password) {
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: b64ToBuf(SALT), iterations: 100000, hash: 'SHA-256' },

    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}
async function unlock() {
  const password = document.getElementById('password').value;
  const error = document.getElementById('error');
  error.textContent = '';
  try {
    const key = await deriveKey(password);
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBuf(IV) }, key, b64ToBuf(CT));
    document.open();
    document.write(dec.decode(plain));
    document.close();
  } catch (e) {
    error.textContent = 'Неверный пароль';
  }
}
document.getElementById('open').addEventListener('click', unlock);
document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') unlock(); });
